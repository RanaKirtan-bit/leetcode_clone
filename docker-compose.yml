version: "3.9"

services:
  server:
    image: judge0/judge0:1.13.1
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:13
    env_file: judge0.conf
    volumes:
      - judge0_db:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    command: redis-server --requirepass judge0_redis_pass
    volumes:
      - judge0_redis:/data
    restart: always

volumes:
  judge0_db:
  judge0_redis:
